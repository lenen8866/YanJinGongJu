    implementation 'com.umeng.umsdk:share-board:7.1.5'
    implementation 'com.umeng.umsdk:share-qq:7.1.5'
    implementation 'com.umeng.umsdk:share-wx:7.1.5'
    implementation 'com.umeng.umsdk:asms:1.2.3' // asms包依赖(必选)
//    implementation 'com.umeng.sdk:utdid:1.1.5.3'
    implementation 'com.tencent.tauth:qqopensdk:3.53.0'//QQ官方依赖库，必选
    implementation 'com.tencent.mm.opensdk:wechat-sdk-android-without-mta:6.7.0'//微信官方依赖库，必选


    implementation 'com.github.promeg:tinypinyin:2.0.3'
    implementation 'com.github.promeg:tinypinyin-lexicons-android-cncity:2.0.3'

    def room_version = "2.2.5"
    implementation "androidx.room:room-runtime:$room_version"
    annotationProcessor "androidx.room:room-compiler:$room_version"
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'me.dkzwm.widget.srl:core:1.6.6.8'

    implementation 'com.contrarywind:Android-PickerView:4.1.9'
    implementation 'com.binioter:guideview:1.0.0'
    //推送
    implementation 'cn.jiguang.sdk:jcore:2.7.2'  // 此处以JCore 2.7.2 版本为例。
    implementation 'cn.jiguang.sdk:jpush:4.0.0'  // 此处以JPush 4.0.0 版本为例
    // 接入华为厂商
    implementation 'com.huawei.hms:push:4.0.2.300'
    implementation 'cn.jiguang.sdk.plugin:huawei:4.0.0'// 极光厂商插件版本与接入 JPush 版本保持一致，下同
    // 接入 FCM 厂商
//    implementation 'com.google.firebase:firebase-messaging:21.0.1'
//    implementation 'cn.jiguang.sdk.plugin:fcm:4.0.0'
    // 接入魅族厂商
    implementation 'cn.jiguang.sdk.plugin:meizu:4.0.0'
    // 接入 VIVO 厂商
    implementation 'cn.jiguang.sdk.plugin:vivo:4.0.0'
    // 接入 OPPO 厂商
    implementation 'cn.jiguang.sdk.plugin:oppo:4.0.0'
    // 接入小米厂商
    implementation 'cn.jiguang.sdk.plugin:xiaomi:4.0.0'
    implementation 'org.litepal.android:kotlin:3.0.0'
    implementation 'com.dsiner.lib:slidelayout:1.0.4'
}


android {
    useLibrary 'org.apache.http.legacy'
    ndkVersion '22.0.7026061'
    signingConfigs {
        release {
            keyAlias '醉雪乱'
            keyPassword '123456'
            storeFile file('../lgmshare/hudong.keystore')
            storePassword '123456'
        }
        debug {
            storeFile file('../lgmshare/hudong.keystore')
            storePassword "123456"
            keyAlias "醉雪乱"
            keyPassword "123456"
        }
    }
    compileSdkVersion 29
    buildToolsVersion "29.0.3"

    defaultConfig {
        applicationId "com.read.scriptures"
        versionCode 37
        // FIX: minSdkVersion 去掉重复声明，只保留一个，即 API 23
        minSdkVersion 23
        versionName "3.0"
        targetSdkVersion 29
        multiDexEnabled true
        ndk {
            abiFilters "armeabi-v7a"
        }
        // 适配默认语言英语
        resConfigs 'en'

        manifestPlaceholders = [
                qqappid       : "1105925560",
                JPUSH_PKGNAME : applicationId,
                JPUSH_APPKEY  : "f73fde01c4d5df1c53d39eee", //JPush 上注册的包名对应的 Appkey.
                JPUSH_CHANNEL : "developer-default", //暂时填写默认值即可.
                MEIZU_APPKEY  : "MZ-魅族的APPKEY",
                MEIZU_APPID   : "MZ-魅族的APPID",
                XIAOMI_APPID  : "2882303761519920309",
                XIAOMI_APPKEY : "5711992024309",
                OPPO_APPKEY   : "OP-oppo的APPKEY",
                OPPO_APPID    : "OP-oppo的APPID",
                OPPO_APPSECRET: "OP-oppo的APPSECRET",
                VIVO_APPKEY   : "vivo的APPKEY",
                VIVO_APPID    : "vivo的APPID"
        ]
    }
    lintOptions {
//        checkReleaseBuilds false
        // Or, if you prefer, you can continue to check for errors in release builds,
        // but continue the build even when errors are found:
        abortOnError false
    }
    buildTypes {
        release {
            //是否移除无用资源
            zipAlignEnabled false
            //是否混淆
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            // 备注："debug"类型的构建类型
//            applicationIdSuffix ".debug"
            buildConfigField "boolean", "LOG_DEBUG", "true"
//            zipAlignEnabled true
            //是否混淆ChapterReaderActivity
//            minifyEnabled true
//            shrinkResources true
//            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            minifyEnabled false
            zipAlignEnabled false
            shrinkResources false
        }
    }

    flavorDimensions "default"
    productFlavors {
        internal {
            manifestPlaceholders = [DISTRIBUTE_CHANNEL_VALUE: "1", YOUMI_CHANNEL_VALUE: "", WP_APP_PID_VALUE: "defualt"]
            dimension "default"
        }

        yingyongbao {
            manifestPlaceholders = [DISTRIBUTE_CHANNEL_VALUE: "2", YOUMI_CHANNEL_VALUE: "", WP_APP_PID_VALUE: "defualt"]
            dimension "default"
        }
    }
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            resources.srcDirs = ['src']
            aidl.srcDirs = ['src']
            renderscript.srcDirs = ['src']
            res.srcDirs = ['res']
            assets.srcDirs = ['assets']
            jniLibs.srcDirs = ['libs']
        }

    }

    //修改默认打包名称  QuickCash_1.0.1.202003041432_Alpha.apk
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (variant.buildType.name == "debug") {
                output.outputFileName = "${variant.versionName}.${getCurrentTime()}_Debug.apk"
            } else if (variant.buildType.name == "release") {
                output.outputFileName = "${variant.versionName}_${getCurrentTime()}.apk"
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    compileOptions {
        encoding "UTF-8"
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}


//获取当前时间
def getCurrentTime() {
    return new Date().format("yyyyMMddHHmm")
}
